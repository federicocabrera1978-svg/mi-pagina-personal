<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Mejorada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #222;
            color: white;
            text-align: center;
            padding: 30px;
        }

        nav {
            background: #444;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        main {
            padding: 20px;
        }

        section {
            background: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 800px;
            border-radius: 10px;
        }

        button {
            background: #222;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #555;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a mi Página Web</h1>
        <p>Diseñada con HTML, CSS y JavaScript</p>
    </header>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
    </nav>

    <main>
        <section>
            <h2>Sobre mí</h2>
            <p>Estoy aprendiendo desarrollo web y creando mis primeras páginas.</p>
        </section>

        <section>
            <h2>Mis habilidades</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript básico</li>
            </ul>
        </section>

        <section>
            <h2>Interacción</h2>
            <button onclick="saludar()">Haz clic aquí</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mi Página Personal</p>
    </footer>

    <script>
        function saludar() {
            alert("Gracias por visitar mi página");
        }
    </script>

</body>
</html>
